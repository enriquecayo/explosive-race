server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Primer intenta servir la petició com a fitxer real ($uri)
        # Si no existeix, envia-ho a l'index.html de l'SPA.
        # Nota: Hem tret $uri/ per evitar que Nginx intenti llistar el directori /downloads/
        # i ens doni el 403.
        try_files $uri /index.html;
    }

    # Opcional: Configuració de cache per a assets estàtics
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
