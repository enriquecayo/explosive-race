services:
  frontend:
    container_name: gamehub-frontend-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_URL: "http://localhost:3000/api"
    depends_on:
      - backend
    networks:
      - frontend-network
      - backend-network

  backend:
    container_name: gamehub-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    env_file:
      - ./backend/.env
    environment:
      PORT: "3000"
      NODE_ENV: development
    networks:
      - frontend-network
      - backend-network

volumes:
  frontend_node_modules:
  backend_node_modules:

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
